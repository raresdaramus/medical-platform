server:
  port: 8083

spring:
  application:
    name: consultation-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/consult_db}
    username: ${SPRING_DATASOURCE_USERNAME:consult_user}
    password: ${SPRING_DATASOURCE_PASSWORD:consult_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}

user:
  service:
    url: ${USER_SERVICE_URL:http://localhost:8082}

groq:
  api:
    key: ${GROQ_API_KEY:}
    url: https://api.groq.com/openai/v1/chat/completions
    model: llama-3.3-70b-versatile
