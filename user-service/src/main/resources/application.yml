server:
  port: 8082

spring:
  application:
    name: user-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/users_db}
    username: ${SPRING_DATASOURCE_USERNAME:users_user}
    password: ${SPRING_DATASOURCE_PASSWORD:users_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
